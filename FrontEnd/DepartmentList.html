<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department List</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="DepartmentList.css">
</head>

<body>

    <div class="container">

        <div class="side-bar">

            <div class="sidebar-brand">
                <h2>Student Management System</h2>
            </div>

            <ul>

                <li>
                    <a href="Dashboard.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="Student.html">
                        <i class="fa-solid fa-user-graduate"></i>
                        Students
                    </a>
                </li>

                <li class="active">
                    <a href="DepartmentList.html">
                        <i class="fa-solid fa-building-columns"></i>
                        Departments
                    </a>
                </li>

                <li>
                    <a href="ViewStudent.html">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

                <li>
                    <a href="Login.html">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </div>

        <div class="main-content">

            <div class="navbar">

                <div class="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </div>

            </div>

            <div class="page-header">

                <h2>Department List</h2>

                <div class="breadcrumb">
                    <span class="link-muted">Home</span> /
                    <span class="link-active">Departments</span>
                </div>

            </div>

            <div class="table-section">

                <div class="table-header">

                    <h3>Departments</h3>

                    <div class="table-controls">

                        <input type="text" id="searchDepartment" placeholder="Search Department">

                        <a href="AddDepartment.html">

                            <button type="button" class="add-btn">

                                <i class="fa-solid fa-plus"></i>

                                Add Department

                            </button>

                        </a>

                    </div>

                </div>

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Department Name</th>

                            <th>Department Code</th>

                            <th>Description</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="departmentTableBody">
                        <tr>
                            <td colspan="5">Loading departments...</td>
                        </tr>
                    </tbody>

                </table>

                <div class="pagination">

                    <button type="button">
                        <i class="fa-solid fa-angle-left"></i>
                        Previous
                    </button>

                    <button type="button" class="active">1</button>

                    <button type="button">2</button>

                    <button type="button">3</button>

                    <button type="button">
                        Next
                        <i class="fa-solid fa-angle-right"></i>
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>
        const API_BASE_URL = "https://student-management-system-0wic.onrender.com/api/departments";

        // Run as soon as the page loads
        document.addEventListener("DOMContentLoaded", loadDepartments);

        // Fetch all departments and render them
        async function loadDepartments() {
            try {
                const response = await fetch(API_BASE_URL);

                if (!response.ok) {
                    throw new Error("Failed to fetch departments");
                }

                const departments = await response.json();
                renderDepartments(departments);

            } catch (error) {
                console.error("Error loading departments:", error);
                document.getElementById("departmentTableBody").innerHTML =
                    `<tr><td colspan="5">Could not load departments. Is the backend running?</td></tr>`;
            }
        }

        // Build table rows dynamically
        function renderDepartments(departments) {
            const tbody = document.getElementById("departmentTableBody");
            tbody.innerHTML = "";

            if (departments.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5">No departments found.</td></tr>`;
                return;
            }

            departments.forEach(dept => {
                const row = document.createElement("tr");

                row.innerHTML = `
                <td>${dept.id}</td>
                <td>${dept.name}</td>
                <td>${dept.code}</td>
                <td>${dept.description}</td>
                <td>
                    <button class="view-btn" title="View" onclick="viewDepartment(${dept.id})">
                        <i class="fa-solid fa-eye"></i>
                    </button>

                    <button class="edit-btn" title="Edit" onclick="editDepartment(${dept.id})">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="delete-btn" title="Delete" onclick="deleteDepartment(${dept.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            `;

                tbody.appendChild(row);
            });
        }

        // Delete Department
        async function deleteDepartment(id) {
            const confirmDelete = confirm("Are you sure you want to delete this department?");

            if (!confirmDelete) return;

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    alert("Department deleted successfully");
                    loadDepartments();
                } else {
                    alert("Failed to delete department");
                }

            } catch (error) {
                console.error("Delete error:", error);
                alert("Could not connect to the server.");
            }
        }

        // View Department
        function viewDepartment(id) {
            window.location.href = `ViewDepartment.html?id=${id}`;
        }

        // Edit Department
        function editDepartment(id) {
            window.location.href = `EditDepartment.html?id=${id}`;
        }

        // Search Department
        document.getElementById("searchDepartment").addEventListener("input", async function () {

            const keyword = this.value.trim();

            if (keyword === "") {
                loadDepartments();
                return;
            }

            try {
                const response = await fetch(
                    `${API_BASE_URL}/search?keyword=${encodeURIComponent(keyword)}`
                );

                if (response.ok) {
                    const results = await response.json();
                    renderDepartments(results);

                } else if (response.status === 404) {
                    document.getElementById("departmentTableBody").innerHTML =
                        `<tr><td colspan="5">No matching departments found.</td></tr>`;
                }

            } catch (error) {
                console.error("Search error:", error);
            }
        });
    </script>

</body>

</html>
