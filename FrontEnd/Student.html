<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="Student.css">

    <title>Students</title>
</head>

<body>


    <header>
        <h2 class="stu-list">Students List</h2>
    </header>

    <div class="container">

        <!-- Sidebar -->
        <div class="side-bar-students">

            <ul>

                <li>
                    <a href="DashBoard.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="Student.html">
                        <i class="fa-solid fa-user-graduate"></i>
                        Students
                    </a>
                </li>

                <li>
                    <a href="DepartmentList.html">
                        <i class="fa-solid fa-building-columns"></i>
                        Departments
                    </a>
                </li>

                <li>
                    <a href="ViewStudent.html">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

                <li>
                    <a href="login.html">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->
        <main>

            <!-- Top Section -->
            <div class="top-section">

                <h3>Students</h3>

                <button onclick="window.location.href='AddStudent.html'">Add Student</button>

            </div>

            <!-- Search Section -->
            <div class="search-section">

                <input type="text" id="searchInput" placeholder="Search Student by email or name">

                <select id="departmentFilter">

                    <option value="">All Departments</option>
                    <option value="CSE">Computer Science</option>
                    <option value="MECH">Mechanical</option>
                    <option value="ECE">Electronics</option>
                    <option value="IT">Information Technology</option>

                </select>

                <button class="button-search" id="searchBtn">
                    Search
                </button>

            </div>

            <!-- Table -->
            <div class="table-section">

                <table>

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Name</th>

                            <th>Department</th>

                            <th>Email</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="studentTableBody">
                        <tr>
                            <td colspan="5">Loading students...</td>
                        </tr>
                    </tbody>

                </table>

            </div>

            <!-- Pagination -->
            <div class="pagination">

                <button>Previous</button>

                <button class="active">1</button>

                <button>2</button>

                <button>Next</button>

            </div>

        </main>

    </div>

    <script>
        const API_BASE_URL = "https://student-management-system-0wic.onrender.com/api/students";

        // Load all students on page load
        document.addEventListener("DOMContentLoaded", loadStudents);

        async function loadStudents() {
            try {
                const response = await fetch(`${API_BASE_URL}/getallstudentDetails`);

                if (!response.ok) {
                    throw new Error("Failed to fetch students");
                }

                const students = await response.json();
                renderStudents(students);

            } catch (error) {
                console.error("Error loading students:", error);
                document.getElementById("studentTableBody").innerHTML =
                    `<tr><td colspan="5">Could not load students.</td></tr>`;
            }
        }

        function renderStudents(students) {
            const tbody = document.getElementById("studentTableBody");
            tbody.innerHTML = "";

            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5">No students found.</td></tr>`;
                return;
            }

            students.forEach(student => {
                const row = document.createElement("tr");

                row.innerHTML = `
                <td>${student.id}</td>
                <td>${student.fullName}</td>
                <td>${student.department}</td>
                <td>${student.email}</td>
                <td>
                    <button class="view-btn" onclick="viewStudent(${student.id})">
                        <i class="fa-solid fa-eye"></i>
                    </button>

                    <button class="edit-btn" onclick="editStudent(${student.id})">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="delete-btn" onclick="deleteStudent(${student.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            `;

                tbody.appendChild(row);
            });
        }

        async function deleteStudent(id) {
            const confirmDelete = confirm("Are you sure you want to delete this student?");

            if (!confirmDelete) return;

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    alert("Student deleted successfully");
                    loadStudents();
                } else {
                    alert("Failed to delete student");
                }

            } catch (error) {
                console.error("Delete error:", error);
                alert("Could not connect to the server.");
            }
        }

        function viewStudent(id) {
            window.location.href = `ViewStudent.html?id=${id}`;
        }

        function editStudent(id) {
            window.location.href = `Update.html?id=${id}`;
        }

        document.getElementById("searchBtn").addEventListener("click", async function () {

            const keyword = document.getElementById("searchInput").value.trim();

            if (keyword === "") {
                loadStudents();
                return;
            }

            try {

                const response = await fetch(`${API_BASE_URL}/search?name=${encodeURIComponent(keyword)}`);

                if (response.ok) {
                    const results = await response.json();
                    renderStudents(results);

                } else if (response.status === 404) {
                    document.getElementById("studentTableBody").innerHTML =
                        `<tr><td colspan="5">No matching students found.</td></tr>`;
                }

            } catch (error) {
                console.error("Search error:", error);
            }

        });
    </script>

</body>

</html>
