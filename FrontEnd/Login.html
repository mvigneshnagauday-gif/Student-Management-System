<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div class="container">

        <!-- Left Panel -->
        <div class="left-panel">

            <img src="images/graduation.png" alt="Logo" class="logo">

            <h1>Student Management System</h1>

            <p>
                Manage students, courses and faculties easily
            </p>

            <img src="images/books.png" alt="Student Image" class="bottom-image">

        </div>

        <!-- Right Panel -->
        <div class="right-panel">

            <form id="loginForm" class="login-box">

                <h2>Welcome Back!</h2>
                <p>Please login to your account</p>

                <input type="text" placeholder="Username" id="username" required>

                <input type="password" placeholder="Password" id="password" required>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

            </form>

        </div>

    </div>

    <script>
        const API_BASE_URL = "http://localhost:8080/api/auth";

        document.getElementById("loginForm")
            .addEventListener("submit", async function (event) {

                event.preventDefault();

                const loginData = {
                    username: document.getElementById("username").value.trim(),
                    password: document.getElementById("password").value
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(loginData)
                    });

                    if (response.ok) {
                        const result = await response.json();

                        // Store basic session info for this browser tab
                        sessionStorage.setItem("username", result.username);
                        sessionStorage.setItem("role", result.role);

                        alert(`Welcome, ${result.username}! (${result.role})`);

                        // Redirect based on role
                        if (result.role === "ADMIN") {
                            window.location.href = "Dashboard.html";
                        } else if (result.role === "FACULTY") {
                            window.location.href = "Dashboard.html"; // same dashboard for now
                        } else if (result.role === "STUDENT") {
                            window.location.href = "Dashboard.html"; // same dashboard for now
                        } else {
                            window.location.href = "Dashboard.html";
                        }

                    } else if (response.status === 401) {
                        const errorBody = await response.json();
                        alert(errorBody.error || "Invalid username or password");

                    } else if (response.status === 400) {
                        const errorBody = await response.json();
                        alert("Please check your input: " + JSON.stringify(errorBody));

                    } else {
                        alert(`Error ${response.status}: Something went wrong.`);
                    }

                } catch (error) {
                    console.error("Error:", error);
                    alert("Could not connect to the server. Is the backend running?");
                }

            });

    </script>

</body>

</html>
