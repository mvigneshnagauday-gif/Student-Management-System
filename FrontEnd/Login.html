<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div class="container">

        <!-- Left Panel -->
        <div class="left-panel">

            <img src="images/graduation.png" alt="Logo" class="logo">

            <h1>Student Management System</h1>

            <p>
                Manage students, courses and faculties easily
            </p>

            <img src="images/books.png" alt="Student Image" class="bottom-image">

        </div>

        <!-- Right Panel -->
        <div class="right-panel">

            <form id="loginForm" class="login-box">

                <h2>Welcome Back!</h2>

                <p>Please login to your account</p>

                <input type="text" id="username" placeholder="Username" required>

                <input type="password" id="password" placeholder="Password" required>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

    <script>

        // Render Backend URL
        const API_BASE_URL = "https://student-management-system-0wic.onrender.com/api";

        document.getElementById("loginForm").addEventListener("submit", async function (event) {

            event.preventDefault();

            const loginData = {
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value
            };

            try {

                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(loginData)
                });

                if (response.ok) {

                    const result = await response.json();

                    sessionStorage.setItem("username", result.username);
                    sessionStorage.setItem("role", result.role);

                    alert(`Welcome ${result.username}`);

                    window.location.href = "Dashboard.html";

                }
                else if (response.status === 401) {

                    const error = await response.json();
                    alert(error.error || "Invalid Username or Password");

                }
                else {

                    const text = await response.text();
                    alert("Login Failed\n\n" + text);

                }

            }
            catch (error) {

                console.error(error);
                alert("Unable to connect to the server.");

            }

        });

    </script>

</body>

</html>
