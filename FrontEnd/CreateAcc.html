<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="CreateAcc.css">
</head>

<body>

    <div class="container">

        <div class="form-card">

            <h2>Create Your Account</h2>

            <p>Fill in the details below to create your account.</p>

            <form id="registerForm">

                <div class="form-group">

                    <label for="username">Username</label>

                    <input type="text" id="username" name="username" placeholder="Enter username" required>

                </div>

                <div class="form-group">

                    <label for="email">Email Address</label>

                    <input type="email" id="email" name="email" placeholder="Enter email address" required>

                </div>

                <div class="form-group">

                    <label for="password">Password</label>

                    <input type="password" id="password" name="password" placeholder="Enter password" required>

                </div>

                <div class="form-group">

                    <label for="confirmPassword">Confirm Password</label>

                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password"
                        required>

                </div>

                <div class="form-group">

                    <label for="role">Role</label>

                    <select id="role" name="role" required>

                        <option value="">-- Select Role --</option>

                        <option value="STUDENT">Student</option>

                        <option value="FACULTY">Faculty</option>

                        <option value="ADMIN">Administrator</option>

                    </select>

                </div>

                <button type="submit" class="register-btn">

                    <i class="fa-solid fa-user-plus"></i>

                    Create Account

                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="Login.html">Login</a>

            </div>

        </div>

    </div>

    <script>
        const API_BASE_URL = "http://localhost:8080/api/auth";

        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const role = document.getElementById("role").value;

            // Frontend check: passwords must match
            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            const registerData = {
                username: username,
                password: password,
                role: role
            };

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(registerData)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`Account created successfully for "${result.username}"! Please log in.`);
                    window.location.href = "Login.html";

                } else if (response.status === 401) {
                    const errorBody = await response.json();
                    alert(errorBody.error || "Username already exists");

                } else if (response.status === 400) {
                    const errorBody = await response.json();
                    alert("Please check your input: " + JSON.stringify(errorBody));

                } else {
                    alert(`Error ${response.status}: Something went wrong.`);
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Could not connect to the server. Is the backend running?");
            }
        });
    </script>

</body>

</html>
